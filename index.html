};

// ── Core Supabase REST helpers ────────────────────────────────

async function sbGet(table) {
  const resp = await fetch(`${SB_URL}/rest/v1/${table}?select=*&order=id`, {
    headers: { ...SB_HEADERS, 'Prefer': 'return=representation' },
  });
  if (!resp.ok) throw new Error(`GET ${table} failed: ${resp.status} ${await resp.text()}`);
  return await resp.json();
}

async function sbInsert(table, row) {
  const resp = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method:  'POST',
    headers: SB_HEADERS,
    body:    JSON.stringify(row),
  });
  if (!resp.ok) throw new Error(`INSERT ${table} failed: ${resp.status} ${await resp.text()}`);
  const result = await resp.json();
  return Array.isArray(result) ? result[0] : result;
}

async function sbUpdate(table, id, row) {
  const resp = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method:  'PATCH',
    headers: SB_HEADERS,
    body:    JSON.stringify(row),
  });
  if (!resp.ok) throw new Error(`UPDATE ${table}(${id}) failed: ${resp.status} ${await resp.text()}`);
  const result = await resp.json();
  return Array.isArray(result) ? result[0] : result;
}

async function sbDelete(table, id) {
  const resp = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method:  'DELETE',
    headers: SB_HEADERS,
  });
  if (!resp.ok) throw new Error(`DELETE ${table}(${id}) failed: ${resp.status} ${await resp.text()}`);
}

async function sbUpsert(table, rows, onConflict='id') {
  if (!rows.length) return;
  const resp = await fetch(`${SB_URL}/rest/v1/${table}?on_conflict=${onConflict}`, {
    method:  'POST',
    headers: { ...SB_HEADERS, 'Prefer': 'resolution=merge-duplicates,return=representation' },
    body:    JSON.stringify(rows),
  });
  if (!resp.ok) throw new Error(`UPSERT ${table} failed: ${resp.status} ${await resp.text()}`);
  return await resp.json();
}

// ── Connection state ──────────────────────────────────────────
let sbConnected = false;

async function checkSBConnection() {
  try {
    const resp = await fetch(`${SB_URL}/rest/v1/sl_jobs?select=id&limit=1`, {
      headers: SB_HEADERS,
    });
    return resp.ok;
  } catch(e) { return false; }
}

// ── Load all data from Supabase ───────────────────────────────
async function loadAllFromSP() {
  updateSyncStatus('⟳ Connecting to Supabase...');
  const ok = await checkSBConnection();
  if (!ok) {
    sbConnected = false;
    updateSyncStatus('⚠ Could not connect to database — using local data');
    return;
  }
  sbConnected = true;
  updateSyncStatus('⟳ Loading live data...');

  try {
    const [j, m, hd, ho, hr, bs, ar] = await Promise.allSettled([
      sbGet('sl_jobs'),
      sbGet('sl_measure'),
      sbGet('sl_hand_deliver'),
      sbGet('sl_hand_onsite'),
      sbGet('sl_hand_records'),
      sbGet('sl_builder_summary'),
      sbGet('sl_archive'),
    ]);

    if (j.status  === 'fulfilled') { jobs = j.value.map(SB_MAP.jobs.fromSB); saveMod('jobs', jobs); nextId = Math.max(0,...jobs.map(x=>x.id||0))+1; persistJobs(); }
    if (m.status  === 'fulfilled') { measureJobs    = m.value.map(SB_MAP.measure.fromSB);        saveMod('measure',       measureJobs);    }
    if (hd.status === 'fulfilled') { handDeliver    = hd.value.map(SB_MAP.handDeliver.fromSB);   saveMod('handDeliver',   handDeliver);    }
    if (ho.status === 'fulfilled') { handOnsite     = ho.value.map(SB_MAP.handOnsite.fromSB);    saveMod('handOnsite',    handOnsite);     }
    if (hr.status === 'fulfilled') { handRecords    = hr.value.map(SB_MAP.handRecords.fromSB);   saveMod('handRecords',   handRecords);    }
    if (bs.status === 'fulfilled') { builderSummary = bs.value.map(SB_MAP.builderSummary.fromSB);saveMod('builderSummary',builderSummary); }
    if (ar.status === 'fulfilled') { archiveJobs    = ar.value.map(SB_MAP.archive.fromSB);       saveMod('archive',       archiveJobs);    }

    const total = jobs.length + measureJobs.length;
    updateSyncStatus(`✓ Live — ${jobs.length} diary jobs, ${measureJobs.length} measure records`);
    render();
  } catch(e) {
    console.error('Load error:', e);
    updateSyncStatus('⚠ Load failed — using local data. ' + e.message);
  }
}

// ── Save single record to Supabase ────────────────────────────
async function sbSaveRecord(table, sbMap, record) {
  if (!sbConnected) return;
  try {
    const row = sbMap.toSB(record);
    if (record._sbId) {
      const updated = await sbUpdate(table, record._sbId, row);
      if (updated) record._sbId = updated.id;
    } else {
      const created = await sbInsert(table, row);
      if (created) record._sbId = created.id;
    }
    updateSyncStatus('✓ Saved — ' + new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    console.error(`Save error [${table}]:`, e);
    updateSyncStatus('⚠ Save failed: ' + e.message);
  }
}

// Convenience wrappers used throughout the app
async function spSaveRecord(dataKey, record) {
  const map = { jobs:'sl_jobs', measure:'sl_measure', handDeliver:'sl_hand_deliver',
                handOnsite:'sl_hand_onsite', builderSummary:'sl_builder_summary', archive:'sl_archive' };
  const sbMap = { jobs:SB_MAP.jobs, measure:SB_MAP.measure, handDeliver:SB_MAP.handDeliver,
                  handOnsite:SB_MAP.handOnsite, builderSummary:SB_MAP.builderSummary, archive:SB_MAP.archive };
  if (map[dataKey]) await sbSaveRecord(map[dataKey], sbMap[dataKey], record);
}

async function spDeleteRecord(dataKey, record) {
  if (!sbConnected || !record._sbId) return;
  const map = { jobs:'sl_jobs', measure:'sl_measure', handDeliver:'sl_hand_deliver',
                handOnsite:'sl_hand_onsite', builderSummary:'sl_builder_summary', archive:'sl_archive' };
  if (map[dataKey]) {
    try { await sbDelete(map[dataKey], record._sbId); }
    catch(e) { console.error('Delete error:', e); }
  }
}

// ── Bulk sync (used by import) ────────────────────────────────
async function syncAllToSP() {
  if (!sbConnected) { updateSyncStatus('⚠ Not connected'); return; }
  updateSyncStatus('⟳ Syncing all data to Supabase...');

  try {
    // Jobs — upsert by id
    const jobRows = jobs.map(SB_MAP.jobs.toSB);
    if (jobRows.length) await sbUpsert('sl_jobs', jobRows, 'id');

    // Measure — delete all then reinsert (simpler for bulk)
    const measureRows = measureJobs.map(SB_MAP.measure.toSB);
    if (measureRows.length) {
      await fetch(`${SB_URL}/rest/v1/sl_measure?id=gt.0`, { method:'DELETE', headers:SB_HEADERS });
      // Insert in batches of 500
      for (let i=0; i<measureRows.length; i+=500) {
        await sbUpsert('sl_measure', measureRows.slice(i,i+500), 'id');
      }
    }

    // Other tables
    const tables = [
      { name:'sl_hand_deliver',    data:handDeliver,    map:SB_MAP.handDeliver    },
      { name:'sl_hand_onsite',     data:handOnsite,     map:SB_MAP.handOnsite     },
      { name:'sl_hand_records',    data:handRecords,    map:SB_MAP.handRecords    },
      { name:'sl_builder_summary', data:builderSummary, map:SB_MAP.builderSummary },
      { name:'sl_archive',         data:archiveJobs,    map:SB_MAP.archive        },
    ];

    for (const t of tables) {
      if (!t.data.length) continue;
      // Delete all existing
      await fetch(`${SB_URL}/rest/v1/${t.name}?id=gt.0`, { method:'DELETE', headers:SB_HEADERS });
      // Insert in batches
      const rows = t.data.map(t.map.toSB);
      for (let i=0; i<rows.length; i+=500) {
        await fetch(`${SB_URL}/rest/v1/${t.name}`, {
          method:'POST', headers:SB_HEADERS, body:JSON.stringify(rows.slice(i,i+500))
        });
      }
    }

    updateSyncStatus(`✓ All data synced to Supabase — ${new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}`);
  } catch(e) {
    console.error('Sync error:', e);
    updateSyncStatus('⚠ Sync failed: ' + e.message);
  }
}

function updateSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = msg.startsWith('✓') ? '#4ade80'
                 : msg.startsWith('⚠') ? '#fbbf24'
                 : '#94a3b8';
}

// ═══════════════════════════════════════════════════════════════
// AUDIT TRAIL
// Records every significant change with user + timestamp
// Stored in localStorage AND pushed to SL_AuditLog SP list (if exists)
// ═══════════════════════════════════════════════════════════════

let auditLog = loadMod('auditLog', 'audit_log');

function recordAudit(action, jobId, field, oldVal, newVal, extra) {
  const entry = {
    id:        Date.now(),
    ts:        new Date().toISOString(),
    user:      getUserName(),
    userEmail: getUserEmail(),
    action,        // e.g. 'STATUS_CHANGE', 'EDIT_JOB', 'ADD_JOB', 'DELETE_JOB'
    jobId:     jobId || '',
    field:     field || '',
    oldVal:    String(oldVal || ''),
    newVal:    String(newVal || ''),
    extra:     extra || '',
  };
  auditLog.unshift(entry); // newest first
  if (auditLog.length > 2000) auditLog = auditLog.slice(0, 2000); // cap at 2000
  saveMod('auditLog', auditLog);
  return entry;
}

function fmtAuditTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
}

function renderAuditModal(jobId) {
  const entries = jobId
    ? auditLog.filter(e => e.jobId === jobId)
    : auditLog.slice(0, 100);

  const rows = entries.length === 0
    ? '<tr><td colspan="5" style="text-align:center;padding:20px;color:#6b7280">No changes recorded yet</td></tr>'
    : entries.map(e => {
        const actionColors = {
          'STATUS_CHANGE': '#1d4ed8', 'EDIT_JOB':'#065f46', 'ADD_JOB':'#166534',
          'DELETE_JOB':'#991b1b', 'IMPORT':'#7c3aed', 'MEASURE_EDIT':'#854d0e',
        };
        const color = actionColors[e.action] || '#374151';
        return `<tr>
          <td style="font-size:10px;color:#6b7280;white-space:nowrap">${fmtAuditTime(e.ts)}</td>
          <td style="font-weight:700;font-size:11px">${e.user}</td>
          <td><span style="font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;background:${color}20;color:${color}">${e.action.replace(/_/g,' ')}</span></td>
          <td style="font-size:11px">${e.jobId||'—'}</td>
          <td style="font-size:11px;max-width:300px">
            ${e.field ? `<span style="color:#6b7280">${e.field}:</span> ` : ''}
            ${e.oldVal ? `<span style="text-decoration:line-through;color:#991b1b">${e.oldVal}</span> → ` : ''}
            ${e.newVal ? `<span style="font-weight:700;color:#166534">${e.newVal}</span>` : ''}
            ${e.extra ? `<span style="color:#6b7280"> ${e.extra}</span>` : ''}
          </td>
        </tr>`;
      }).join('');

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.style.display = 'flex';
  modal.onclick = e => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div class="modal" style="width:800px;max-width:95vw" onclick="event.stopPropagation()">
      <div class="modal-title">
        <span>📋 ${jobId ? `Change History — ${jobId}` : 'Full Audit Log (last 100)'}</span>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
      </div>
      <div class="table-wrap" style="max-height:60vh;overflow-y:auto">
        <table>
          <thead><tr>
            <th>Date / Time</th><th>User</th><th>Action</th><th>Job ID</th><th>Details</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="margin-top:12px;text-align:right">
        <button onclick="this.closest('.modal-overlay').remove()" class="btn-cancel">Close</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function setView(v) {
  currentView = v;
  ["diary","dashboard","config","measure","rto","archive","handdeliver","handonsite","handrecords",
   "reprun","certifier","buildersummary","directory","stock"]
    .forEach(n => { const el = document.getElementById('btn-'+n); if (el) el.classList.toggle("active", n===v); });
  render();
}
function prevWeek() { const d=new Date(currentWeekStart+"T00:00:00"); d.setDate(d.getDate()-7); currentWeekStart=d.toISOString().split("T")[0]; render(); }
function nextWeek() { const d=new Date(currentWeekStart+"T00:00:00"); d.setDate(d.getDate()+7); currentWeekStart=d.toISOString().split("T")[0]; render(); }
function goToday()  { currentWeekStart=getMondayOf(new Date().toISOString().split("T")[0]); render(); }

function render() {
  try {
    const jc = document.getElementById("job-count");
    if (jc) jc.textContent = `${jobs.length} jobs`;
    if      (currentView==="diary")          renderDiary();
    else if (currentView==="dashboard")      renderDashboard();
    else if (currentView==="config")         renderConfig();
    else if (currentView==="measure")        renderMeasure();
    else if (currentView==="rto")            renderRTO();
    else if (currentView==="archive")        renderArchive();
    else if (currentView==="handdeliver")    renderHandDeliver();
    else if (currentView==="handonsite")     renderHandOnsite();
    else if (currentView==="handrecords")    renderHandRecords();
    else if (currentView==="reprun")         renderRepRun();
    else if (currentView==="certifier")      renderCertifier();
    else if (currentView==="buildersummary") renderBuilderSummary();
    else if (currentView==="directory")      renderDirectory();
    else if (currentView==="stock")          renderStock();
    renderLegend();
  } catch(e) {
    console.error("render() error:", e);
    const app = document.getElementById("app");
    if (app) app.innerHTML = `<div style="padding:40px;text-align:center">
      <div style="font-size:48px">⚠</div>
      <div style="font-size:16px;font-weight:700;color:#991b1b;margin:12px 0">Error in ${currentView} tab</div>
      <div style="font-size:12px;color:#6b7280;font-family:monospace;background:#f9fafb;padding:12px;border-radius:6px;margin-bottom:16px">${e.message}</div>
      <button onclick="currentView='diary';render()" style="background:#1d4ed8;color:#fff;border:none;border-radius:6px;padding:8px 20px;cursor:pointer;font-weight:700">← Back to Diary</button>
    </div>`;
  }
}

function renderLegend() {
  const el = document.getElementById("legend");
  if (!el) return;
  if (currentView !== "diary") { el.innerHTML=""; return; }
  el.innerHTML = `<span class="legend-label">STATUS:</span>` +
    STATUSES.map(s=>`<span class="status-badge" style="background:${s.bg};color:${s.color};border:1px solid ${s.border}">${s.val}</span>`).join("") +
    `<span style="font-size:10px;color:#9ca3af;margin-left:8px">Click any status badge to cycle through statuses</span>`;
}
