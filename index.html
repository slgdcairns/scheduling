<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel-Line Install Scheduler</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; min-height: 100vh; font-size: 13px; }
  .header { background: #0f172a; border-bottom: 3px solid #3b82f6; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
  .header-inner { display: flex; align-items: center; justify-content: space-between; height: 54px; gap: 8px; }
  .brand { display: flex; flex-direction: column; line-height: 1; }
  .brand-main { font-size: 16px; font-weight: 900; color: #f8fafc; letter-spacing: .5px; }
  .brand-sub  { font-size: 9px; font-weight: 600; color: #94a3b8; letter-spacing: 2px; margin-top: 2px; }
  .divider    { width: 1px; height: 28px; background: #334155; flex-shrink:0; }
  .nav-btn { font-size: 10px; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-weight: 700; border: none; background: transparent; color: #94a3b8; transition: all .15s; white-space:nowrap; }
  .nav-btn.active { background: #3b82f6; color: #fff; }
  .week-nav { display: flex; align-items: center; gap: 8px; }
  .week-nav button { background: #1e293b; border: 1px solid #334155; color: #f8fafc; border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 13px; }
  .week-label { font-size: 11px; font-weight: 700; color: #e2e8f0; white-space: nowrap; min-width: 190px; text-align: center; }
  .today-btn { background: #3b82f6 !important; border-color: #3b82f6 !important; font-size: 10px; font-weight: 800; }
  .job-count { font-size: 10px; color: #64748b; white-space:nowrap; }
  .alert-banner { background: #fffbeb; border-bottom: 2px solid #f59e0b; padding: 8px 20px; display: flex; gap: 20px; flex-wrap: wrap; }
  .alert-banner span { font-size: 11px; color: #92400e; font-weight: 700; }
  .diary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 14px; }
  .day-col { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; box-shadow: 0 1px 4px rgba(0,0,0,.06); display: flex; flex-direction: column; min-height: 320px; }
  .day-col.today { border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; }
  .day-header { background: #f8fafc; border-bottom: 1px solid #e5e7eb; padding: 10px 12px; border-radius: 10px 10px 0 0; }
  .day-col.today .day-header { background: #eff6ff; }
  .day-name { font-size: 13px; font-weight: 900; color: #1f2937; display: flex; align-items: center; gap: 6px; }
  .today-tag { font-size: 9px; background: #3b82f6; color: #fff; padding: 1px 5px; border-radius: 3px; font-weight: 800; }
  .day-date { font-size: 10px; color: #6b7280; margin-top: 1px; }
  .cap-section { margin-top: 8px; }
  .cap-row { margin-bottom: 6px; }
  .cap-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
  .cap-fitter-name { font-size: 10px; font-weight: 800; }
  .cap-zones { display: flex; gap: 3px; flex-wrap: wrap; justify-content:flex-end; }
  .cap-bar-wrap { height: 7px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
  .cap-bar { height: 100%; border-radius: 4px; transition: width .3s; }
  .cap-pts { font-size: 9px; font-weight: 800; margin-top: 2px; }
  .zone-tag { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
  .day-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .btn-sm { font-size: 10px; padding: 3px 9px; border-radius: 5px; cursor: pointer; font-weight: 700; border: none; text-decoration: none; display: inline-block; }
  .btn-add { background: #1d4ed8; color: #fff; }
  .btn-cert { background: #7c3aed; color: #fff; }
  .fitter-section { padding: 8px 10px; }
  .fitter-header { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: .6px; padding-bottom: 4px; margin-bottom: 6px; border-bottom: 2px solid; }
  .no-jobs { font-size: 10px; color: #d1d5db; font-style: italic; padding: 4px 0; }
  .job-card { border-radius: 7px; border: 1px solid; border-left: 4px solid; margin-bottom: 6px; overflow: hidden; }
  .job-card-main { padding: 7px 9px; cursor: pointer; }
  .job-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
  .job-customer { font-size: 11px; font-weight: 800; color: #111827; line-height: 1.3; }
  .job-expand-icon { font-size: 11px; color: #9ca3af; flex-shrink: 0; margin-top: 1px; }
  .job-visual { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
  .door-type-badge { font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 4px; background: #374151; color: #fff; letter-spacing: .3px; }
  .door-type-badge.STRUTLOK { background: #1d4ed8; }
  .door-type-badge.POSTED   { background: #7c3aed; }
  .door-type-badge.ROLLER   { background: #065f46; }
  .door-type-badge.SERVICE  { background: #78350f; }
  .door-type-badge.CALLBACK { background: #78350f; }
  .door-type-badge.CUSTOM   { background: #881337; }
  .door-type-badge.MULTIPLE { background: #374151; }
  .location-chip { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; background: #f1f5f9; color: #374151; border: 1px solid #e2e8f0; }
  .pts-chip { font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 3px; background: #fef9c3; color: #854d0e; }
  .status-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 3px; cursor: pointer; white-space: nowrap; }
  .form15-chip { font-size: 9px; background: #e0e7ff; color: #3730a3; padding: 2px 4px; border-radius: 3px; font-weight: 800; }
  .job-address { font-size: 10px; color: #6b7280; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-alert { background: #fffbeb; padding: 4px 8px; font-size: 10px; color: #92400e; font-weight: 700; border-bottom: 1px solid #fde68a; }
  .job-expanded { background: #f8fafc; border-top: 1px solid #e5e7eb; padding: 10px 12px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; font-size: 11px; }
  .detail-item label { color: #9ca3af; font-size: 9px; font-weight: 700; display: block; text-transform: uppercase; margin-bottom: 1px; }
  .detail-item span { color: #111827; font-weight: 600; }
  .detail-full { grid-column: 1 / -1; }
  .note-internal { color: #dc2626 !important; }
  .status-row { margin-bottom: 10px; }
  .status-row label { color: #9ca3af; font-size: 9px; font-weight: 700; display: block; margin-bottom: 4px; text-transform: uppercase; }
  .status-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .status-btn { font-size: 9px; padding: 3px 7px; border-radius: 3px; cursor: pointer; font-weight: 700; border: 1px solid; }
  .action-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn-edit   { background: #1d4ed8; color: #fff; border: none; border-radius: 5px; padding: 4px 10px; font-size: 10px; font-weight: 700; cursor: pointer; }
  .btn-email  { background: #065f46; color: #fff; border-radius: 5px; padding: 4px 10px; font-size: 10px; font-weight: 700; text-decoration: none; }
  .btn-resched{ background: #854d0e; color: #fff; border-radius: 5px; padding: 4px 10px; font-size: 10px; font-weight: 700; text-decoration: none; }
  .btn-del    { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 5px; padding: 4px 10px; font-size: 10px; font-weight: 700; cursor: pointer; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: #fff; border-radius: 12px; padding: 24px; width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,.3); }
  .modal-title { font-size: 15px; font-weight: 900; color: #111827; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #6b7280; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .form-field label { font-size: 10px; color: #6b7280; font-weight: 700; display: block; margin-bottom: 3px; text-transform: uppercase; }
  .form-field input, .form-field select, .form-field textarea { width: 100%; font-size: 11px; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 5px; font-family: inherit; }
  .form-field.full { grid-column: 1 / -1; }
  .zone-preview { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 5px; padding: 6px 10px; font-size: 11px; margin-bottom: 10px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn-save   { background: #1d4ed8; color: #fff; border: none; border-radius: 7px; padding: 9px 20px; font-size: 12px; font-weight: 800; cursor: pointer; flex: 1; }
  .btn-cancel { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; border-radius: 7px; padding: 9px 20px; font-size: 12px; cursor: pointer; }
  .dashboard { padding: 16px; }
  .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .kpi { border-radius: 10px; padding: 14px 16px; border: 1px solid; }
  .kpi-val { font-size: 28px; font-weight: 900; }
  .kpi-label { font-size: 11px; font-weight: 600; margin-top: 3px; color: #374151; }
  .section-title { font-size: 13px; font-weight: 900; color: #1f2937; margin: 0 0 10px; }
  .table-wrap { background: #fff; border-radius: 8px; border: 1px solid #e5e7eb; overflow: hidden; margin-bottom: 20px; overflow-x:auto; }
  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th { padding: 8px 10px; text-align: left; font-weight: 800; font-size: 10px; border-bottom: 1px solid #e5e7eb; white-space:nowrap; }
  td { padding: 7px 10px; border-top: 1px solid #f3f4f6; }
  tr:nth-child(even) td { background: #f8fafc; }
  .zone-rules { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom:20px; }
  .zone-rule { background: #fff; border-radius: 6px; border: 1px solid #e5e7eb; padding: 8px 10px; }
  .effort-table { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom:20px; }
  .effort-item { background: #fff; border-radius: 6px; border: 1px solid #e5e7eb; padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; }
  .effort-pts { font-size: 16px; font-weight: 900; color: #1d4ed8; }
  .legend { padding: 10px 16px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .legend-label { font-size: 10px; color: #9ca3af; font-weight: 700; }
  /* ── CONFIG ── */
  .config-page { padding: 16px; max-width: 1000px; }
  .config-section { background:#fff; border-radius:10px; border:1px solid #e5e7eb; margin-bottom:20px; overflow:hidden; }
  .config-section-header { background:#f8fafc; border-bottom:1px solid #e5e7eb; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
  .config-section-title { font-size:13px; font-weight:900; color:#1f2937; }
  .config-section-desc { font-size:11px; color:#6b7280; margin-top:2px; }
  .config-body { padding:16px; }
  .config-row { display:grid; gap:10px; margin-bottom:10px; }
  .config-field label { font-size:10px; color:#6b7280; font-weight:700; display:block; margin-bottom:3px; text-transform:uppercase; }
  .config-field input, .config-field select { width:100%; font-size:11px; padding:6px 8px; border:1px solid #d1d5db; border-radius:5px; font-family:inherit; }
  .config-list-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #f3f4f6; }
  .config-list-item input { flex:1; font-size:11px; padding:5px 8px; border:1px solid #d1d5db; border-radius:5px; }
  .config-list-item select { font-size:11px; padding:5px 8px; border:1px solid #d1d5db; border-radius:5px; }
  .btn-cfg-del { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; border-radius:4px; padding:3px 8px; font-size:10px; cursor:pointer; font-weight:700; flex-shrink:0; }
  .btn-cfg-add { background:#f0fdf4; color:#166534; border:1px solid #86efac; border-radius:5px; padding:5px 12px; font-size:11px; cursor:pointer; font-weight:700; margin-top:8px; }
  .btn-cfg-save { background:#1d4ed8; color:#fff; border:none; border-radius:7px; padding:8px 20px; font-size:12px; font-weight:800; cursor:pointer; }
  .btn-cfg-reset { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; border-radius:7px; padding:8px 16px; font-size:11px; font-weight:700; cursor:pointer; }
  .save-toast { position:fixed; bottom:20px; right:20px; background:#166534; color:#fff; padding:10px 18px; border-radius:8px; font-size:12px; font-weight:700; z-index:9999; display:none; box-shadow:0 4px 16px rgba(0,0,0,.2); }
  .fitter-config-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .fitter-config-card { border:1px solid #e5e7eb; border-radius:8px; padding:12px; }
  .fitter-config-card label { font-size:10px; color:#6b7280; font-weight:700; display:block; margin-bottom:3px; text-transform:uppercase; }
  .fitter-config-card input { width:100%; font-size:11px; padding:5px 8px; border:1px solid #d1d5db; border-radius:5px; margin-bottom:8px; }
  .rate-bar { height:8px; border-radius:4px; transition:width .4s; }
  /* tab strip inside dashboard */
  .tab-strip { display:flex; gap:4px; margin-bottom:16px; border-bottom:2px solid #e5e7eb; padding-bottom:0; }
  .tab-btn { font-size:11px; padding:6px 14px; border-radius:6px 6px 0 0; border:1px solid transparent; border-bottom:none; cursor:pointer; font-weight:700; background:transparent; color:#6b7280; }
  .tab-btn.active { background:#fff; color:#1d4ed8; border-color:#e5e7eb; border-bottom-color:#fff; margin-bottom:-2px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
      <div class="brand">
        <span class="brand-main" id="brand-name">STEEL-LINE</span>
        <span class="brand-sub" id="brand-sub">INSTALL SCHEDULING</span>
      </div>
      <div class="divider"></div>
      <div style="display:flex;gap:2px;align-items:center;overflow-x:auto;max-width:70vw;scrollbar-width:none;-ms-overflow-style:none">
        <button class="nav-btn active" id="btn-diary"          onclick="setView('diary')">📅 Diary</button>
        <button class="nav-btn"        id="btn-dashboard"      onclick="setView('dashboard')">📊 Dashboard</button>
        <button class="nav-btn"        id="btn-measure"        onclick="setView('measure')">📐 Measure</button>
        <button class="nav-btn"        id="btn-rto"            onclick="setView('rto')">📦 Ready to Order</button>
        <button class="nav-btn"        id="btn-archive"        onclick="setView('archive')">🗄 Archive</button>
        <button class="nav-btn"        id="btn-handdeliver"    onclick="setView('handdeliver')">🔑 Handsets</button>
        <button class="nav-btn"        id="btn-handonsite"     onclick="setView('handonsite')">📍 Left on Site</button>
        <button class="nav-btn"        id="btn-handrecords"    onclick="setView('handrecords')">📚 HS Records</button>
        <button class="nav-btn"        id="btn-reprun"         onclick="setView('reprun')">🗺 Rep Run</button>
        <button class="nav-btn"        id="btn-certifier"      onclick="setView('certifier')">📋 Certifier</button>
        <button class="nav-btn"        id="btn-buildersummary" onclick="setView('buildersummary')">🏗 Builder Summary</button>
        <button class="nav-btn"        id="btn-directory"      onclick="setView('directory')">📞 Directory</button>
        <button class="nav-btn"        id="btn-stock"          onclick="setView('stock')">🚪 Stock</button>
        <button class="nav-btn"        id="btn-config"         onclick="setView('config')">⚙ Config</button>
      </div>
    </div>
    <div class="week-nav" id="week-nav">
      <button onclick="prevWeek()">‹</button>
      <span class="week-label" id="week-label"></span>
      <button onclick="nextWeek()">›</button>
      <button class="today-btn" onclick="goToday()">TODAY</button>
      <select id="status-filter" onchange="render()" style="font-size:10px;padding:4px 8px;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#f8fafc;cursor:pointer;">
        <option value="ALL">All statuses</option>
        <option value="REQUESTED">Requested</option>
        <option value="CONFIRMED">Confirmed</option>
        <option value="COMPLETED">Completed</option>
        <option value="FUTILE">Futile</option>
        <option value="RESCHEDULED">Rescheduled</option>
        <option value="PENDING RESCHEDULE">Pending Reschedule</option>
      </select>
    </div>
    <span class="job-count" id="job-count"></span>
  </div>
</div>


<div id="login-bar" style="background:#1e293b;border-bottom:1px solid #1e3a5f;padding:5px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:38px;">
  <span style="color:#64748b;font-size:11px">Initialising...</span>
</div>

<div id="sync-bar" style="background:#1e293b;border-bottom:2px solid #334155;padding:6px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;flex-wrap:wrap;">
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
    <span style="color:#94a3b8;font-weight:700;white-space:nowrap">💾 SYNC:</span>
    <span id="sync-status" style="color:#94a3b8;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Connecting to Supabase...</span>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
    <button onclick="importData()" style="background:#166534;color:#fff;border:none;border-radius:5px;padding:5px 14px;font-size:11px;font-weight:800;cursor:pointer">📂 Import from file</button>
    <button onclick="loadAllFromSP().then(()=>render())" style="background:#1d4ed8;color:#fff;border:none;border-radius:5px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">⟳ Refresh</button>
    <button onclick="exportData()" style="background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer">⬇ Backup</button>
  </div>
</div>
<div id="alert-banner" class="alert-banner" style="display:none;"></div>
<div id="app"></div>
<div class="legend" id="legend"></div>
<div class="save-toast" id="save-toast">✓ Settings saved</div>
<input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(event)">





<!-- IMPORT/EXPORT BAR -->

<!-- SIGN IN PROMPT — shown when not logged in -->




<!-- JOB MODAL -->
<div class="modal-overlay" id="modal" style="display:none;" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">
      <span id="modal-title-text">Add Job</span>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-field"><label>Fitter</label><select id="f-fitter"></select></div>
      <div class="form-field"><label>Status</label><select id="f-status"></select></div>
      <div class="form-field full"><label>Builder / Customer</label><select id="f-customer"></select></div>
      <div class="form-field full"><label>Site Address</label><input type="text" id="f-address" placeholder="e.g. LOT 123 SMITH STREET"></div>
      <div class="form-field"><label>Suburb</label><select id="f-suburb" onchange="updateZonePreview()"></select></div>
      <div class="form-field"><label>Door Type</label><select id="f-doorType" onchange="updateEffort()"></select></div>
      <div class="form-field full"><label>Door Details</label><input type="text" id="f-doors" placeholder="e.g. 1X STRUTLOK 2260×5284"></div>
      <div class="form-field"><label>Sage Order #</label><input type="text" id="f-sage"></div>
      <div class="form-field"><label>Effort Points</label><input type="number" id="f-effort" step="0.5" min="0.5" max="20"></div>
      <div class="form-field"><label>Form 15/43</label><select id="f-form15"><option>NO</option><option>YES</option></select></div>
      <div class="form-field"><label>Run Sheet</label><select id="f-runSheet"><option>NO</option><option>YES</option></select></div>
      <div class="form-field"><label>Contacted Via</label><input type="text" id="f-contact" placeholder="SMS / email / phone"></div>
    </div>
    <div id="zone-preview" class="zone-preview" style="display:none;"></div>
    <div class="form-grid">
      <div class="form-field full"><label>Builder Notes (visible to fitter)</label><textarea id="f-builderNotes" rows="2"></textarea></div>
      <div class="form-field full"><label>Internal Notes (Steel-Line only)</label><textarea id="f-internalNotes" rows="2"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveJob()">Save Job</button>
      <button class="btn-cancel" onclick="closeModalDirect()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DEFAULT CONFIG — branches edit this via the Config page
// ═══════════════════════════════════════════════════════════════
const DEFAULT_CONFIG = {
  branchName: "Steel-Line Cairns",
  certifierEmail: "rebeccasmith@steel-line.com.au",
  fitters: [
    { id:"dean",  name:"Dean",  maxLocal:7, maxAway:5, color:"#1e40af" },
    { id:"ethan", name:"Ethan", maxLocal:5, maxAway:5, color:"#065f46" },
    { id:"glenn", name:"Glenn", maxLocal:4, maxAway:4, color:"#7c2d12" },

// LOAD CONFIG FROM localStorage (falls back to defaults)
// ═══════════════════════════════════════════════════════════════
function loadConfig() {
  try {
    const saved = localStorage.getItem("sl_config");
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }
}
function saveConfig(cfg) {
  localStorage.setItem("sl_config", JSON.stringify(cfg));
  cfg_live = cfg;
  rebuildLookups();
}
function loadJobs() {
  try {
    const saved = localStorage.getItem("sl_jobs");
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(SEED_JOBS));
  } catch(e) { return JSON.parse(JSON.stringify(SEED_JOBS)); }
}
function persistJobs() {
  localStorage.setItem("sl_jobs", JSON.stringify(jobs));
}

// ═══════════════════════════════════════════════════════════════
// MODULE DATA LOADERS — localStorage with WORKBOOK_SEED fallback
// ═══════════════════════════════════════════════════════════════
function loadMod(key, seedKey) {
  try {
    const saved = localStorage.getItem('sl_' + key);
    if (saved) return JSON.parse(saved);
    // Fall back to WORKBOOK_SEED if available, otherwise empty array
    if (typeof WORKBOOK_SEED !== 'undefined' && WORKBOOK_SEED[seedKey]) {
      return JSON.parse(JSON.stringify(WORKBOOK_SEED[seedKey]));
    }
    return [];
  } catch(e) {
    if (typeof WORKBOOK_SEED !== 'undefined' && WORKBOOK_SEED[seedKey]) {
      return JSON.parse(JSON.stringify(WORKBOOK_SEED[seedKey]));
    }
    return [];
  }
}

function saveMod(key, data) {
  try {
    localStorage.setItem('sl_' + key, JSON.stringify(data));
  } catch(e) {
    console.warn('saveMod failed for', key, e);
  }
}

// ── Shared UI helpers ─────────────────────────────────────────
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtD(s) {
  if (!s) return '—';
  const d = new Date(s + 'T00:00:00');
  if (isNaN(d.getTime())) return s;
  return d.toLocaleDateString('en-AU', {day:'numeric', month:'short', year:'numeric'});
}

function getZone(suburb){ return SUBURB_ZONE_MAP[(suburb||"").toUpperCase().trim()]||"UNKNOWN"; }
function getStatusMeta(v){ return STATUSES.find(s=>s.val===v)||STATUSES[0]; }
function zonesCompatible(zones){
  const u=[...new Set(zones.filter(z=>z&&z!=="UNKNOWN"))];
  if(u.length<=1)return true;
  const allowed=ZONE_GROUPS_MAP[u[0]]||[u[0]];
  return u.every(z=>allowed.includes(z));
}
function fitterUsed(fJobs){ return fJobs.filter(j=>j.status!=="RESCHEDULED"&&j.status!=="FUTILE").reduce((s,j)=>s+(Number(j.effort)||0),0); }
function fitterMax(fitter,fJobs){
  const zones=fJobs.filter(j=>j.status!=="RESCHEDULED"&&j.status!=="FUTILE").map(j=>getZone(j.suburb));
  const isAway=zones.some(z=>z&&(z.includes("OUT OF TOWN")||z.includes("TABLELANDS")));
  return isAway?fitter.maxAway:fitter.maxLocal;
}
function getWeekDays(startIso){
  const d=new Date(startIso+"T00:00:00");
  return Array.from({length:5},(_,i)=>{const dd=new Date(d);dd.setDate(d.getDate()+i);return dd.toISOString().split("T")[0];});
}
function getMondayOf(iso){
  const d=new Date(iso+"T00:00:00");const day=d.getDay();
  d.setDate(d.getDate()-(day===0?6:day-1));return d.toISOString().split("T")[0];
}
function formatDate(iso){ return new Date(iso+"T00:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}); }
function formatDateLong(iso){ return new Date(iso+"T00:00:00").toLocaleDateString("en-AU",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }

  if(t==="CALLBACK")return "CALLBACK";if(t==="CUSTOM")return "CUSTOM";
  if(t==="MULTIPLE")return "MULTIPLE";return "";
}

  const weekDays=getWeekDays(currentWeekStart);
  document.getElementById("week-label").textContent=`${formatDate(weekDays[0])} – ${formatDate(weekDays[4])}`;
  const filterVal=document.getElementById("status-filter").value;
  const today=new Date().toISOString().split("T")[0];

  // week alerts
  const weekAlerts=[];
  weekDays.forEach(date=>{
    const dj=jobs.filter(j=>j.date===date);
    FITTERS.forEach(f=>{
      const fj=dj.filter(j=>j.fitter===f.id);
      const used=fitterUsed(fj),max=fitterMax(f,fj);
      const zones=[...new Set(fj.filter(j=>j.status!=="RESCHEDULED"&&j.status!=="FUTILE").map(j=>getZone(j.suburb)).filter(Boolean))];
      if(used>max) weekAlerts.push(`${formatDate(date)}: ${f.name} over capacity (${used.toFixed(1)}/${max}pts)`);
      if(!zonesCompatible(zones)) weekAlerts.push(`${formatDate(date)}: ${f.name} – zone conflict`);
    });
  });
  const banner=document.getElementById("alert-banner");
  if(weekAlerts.length){banner.style.display="flex";banner.innerHTML=weekAlerts.map(a=>`<span>⚠ ${a}</span>`).join("");}
  else banner.style.display="none";

  let html=`<div class="diary-grid">`;
  weekDays.forEach(date=>{
    const allDJ=jobs.filter(j=>j.date===date);
    const visDJ=filterVal==="ALL"?allDJ:allDJ.filter(j=>j.status===filterVal);
    const isToday=date===today;
    const certLink=buildCertEmail(allDJ,date);

    const capHtml=FITTERS.map(f=>{
      const fj=allDJ.filter(j=>j.fitter===f.id);
      const used=fitterUsed(fj),max=fitterMax(f,fj);
      const pct=Math.min(100,(used/max)*100);
      const over=used>max,warn=used>=max*.85;
      const barColor=over?"#ef4444":warn?"#f59e0b":f.color;
      const ptsColor=over?"#ef4444":warn?"#b45309":"#374151";
      const zones=[...new Set(fj.filter(j=>j.status!=="RESCHEDULED"&&j.status!=="FUTILE").map(j=>getZone(j.suburb)).filter(Boolean))];
      const zoneOk=zonesCompatible(zones);
      return `<div class="cap-row">
        <div class="cap-label-row">
          <span class="cap-fitter-name" style="color:${f.color}">${f.name}</span>
          <div class="cap-zones">${zones.map(z=>zoneTag(z)).join("")}${!zoneOk?'<span style="font-size:9px;color:#ef4444;font-weight:800">⚠</span>':""}</div>
        </div>
        <div class="cap-bar-wrap"><div class="cap-bar" style="width:${pct}%;background:${barColor}"></div></div>
        <div class="cap-pts" style="color:${ptsColor}">${used.toFixed(1)} / ${max} pts${over?" — OVER!":""}</div>
      </div>`;
    }).join("");

    const jobsHtml=FITTERS.map(f=>{
      const fj=visDJ.filter(j=>j.fitter===f.id);
      const cards=fj.map(job=>{
        const zone=getZone(job.suburb);
        const otherZones=allDJ.filter(j=>j.fitter===f.id&&j.id!==job.id&&j.status!=="RESCHEDULED"&&j.status!=="FUTILE").map(j=>getZone(j.suburb));
        const zoneConflict=!zonesCompatible([zone,...otherZones]);
        const m=getStatusMeta(job.status);
        const dtClass=getDTClass(job.doorType);
        const alerts=[];
        if(zoneConflict) alerts.push(`Zone conflict: ${zone} incompatible with day's zones`);
        if(!job.sage)    alerts.push("No Sage order number");
        if(job.status==="CONFIRMED"&&job.form15!=="YES") alerts.push("Form 15/43 not marked YES");
        const isFutile=job.status==="FUTILE";
        const isResched=job.status==="RESCHEDULED"||job.status==="PENDING RESCHEDULE";
        return `<div class="job-card" style="background:${m.bg};border-color:${m.border};border-left-color:${m.color}">
          ${alerts.map(a=>`<div class="card-alert">⚠ ${a}</div>`).join("")}
          <div class="job-card-main" onclick="toggleCard(${job.id})">
            <div class="job-card-top">
              <div style="flex:1;min-width:0">
                <div class="job-customer">${job.customer}</div>
                <div class="job-address">📍 ${job.address}</div>
              </div>
              <span class="job-expand-icon" id="icon-${job.id}">▼</span>
            </div>
            <div class="job-visual">
              <span class="door-type-badge ${dtClass}">${job.doorType||"UNKNOWN"}</span>
              <span class="location-chip">🏘 ${job.suburb}</span>
              ${zoneTag(zone)}
              ${statusBadge(job,true)}
              <span class="pts-chip">${job.effort}pts</span>
              ${job.form15==="YES"?'<span class="form15-chip">F15</span>':""}
            </div>
            <div style="font-size:10px;color:#374151;margin-top:4px;font-weight:500">🚪 ${job.doors}</div>
            ${job.builderNotes?`<div style="font-size:10px;color:#6b7280;margin-top:2px">💬 ${job.builderNotes}</div>`:""}
          </div>
          <div class="job-expanded" id="expanded-${job.id}" style="display:none">
            <div class="detail-grid">
              <div class="detail-item"><label>Sage Order</label><span>${job.sage||"—"}</span></div>
              <div class="detail-item"><label>Contact Via</label><span>${job.contact||"—"}</span></div>
              <div class="detail-item"><label>Form 15/43</label><span>${job.form15||"—"}</span></div>
              <div class="detail-item"><label>Run Sheet</label><span>${job.runSheet||"—"}</span></div>
              ${job.builderNotes?`<div class="detail-item detail-full"><label>Builder Notes</label><span>${job.builderNotes}</span></div>`:""}
              ${job.internalNotes?`<div class="detail-item detail-full"><label>Internal Notes</label><span class="note-internal">${job.internalNotes}</span></div>`:""}
            </div>
            <div class="status-row"><label>Change status:</label>
              <div class="status-btns">${STATUSES.map(s=>`<button class="status-btn" onclick="setStatus(${job.id},'${s.val}')" style="background:${job.status===s.val?s.color:s.bg};color:${job.status===s.val?"#fff":s.color};border-color:${s.border}">${s.val}</button>`).join("")}</div>
            </div>
            <div class="action-row">
              <button class="btn-edit" onclick="openEdit(${job.id})">✏ Edit</button>
              <button onclick="renderAuditModal('${job.jobId||'D'+job.id}')" style="background:#475569;color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer">📋 History</button>
              <a class="btn-email" href="${buildBuilderEmail(job)}">📧 Builder Update</a>
              ${isFutile?`<a class="btn-resched" style="background:#991b1b" href="${buildFutileEmail(job)}">📧 Futile Notice</a>`:""}
              ${isResched?`<a class="btn-resched" href="${buildReschedEmail(job)}">📧 Reschedule Notice</a>`:""}
              <button class="btn-del" onclick="deleteJob(${job.id})">🗑 Delete</button>
            </div>
          </div>
        </div>`;
      }).join("");
      return `<div class="fitter-section">
        <div class="fitter-header" style="color:${f.color};border-color:${f.color}40">${f.name}</div>
        ${fj.length===0?'<div class="no-jobs">No jobs</div>':cards}
      </div>`;
    }).join("");

    html+=`<div class="day-col${isToday?" today":""}">
      <div class="day-header">
        <div class="day-name">${new Date(date+"T00:00:00").toLocaleDateString("en-AU",{weekday:"long"})}${isToday?'<span class="today-tag">TODAY</span>':""}</div>
        <div class="day-date">${new Date(date+"T00:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"long"})}</div>
        <div class="cap-section">${capHtml}</div>
        <div class="day-actions">
          <button class="btn-sm btn-add" onclick="openAdd('${date}')">+ Add Job</button>
          ${certLink?`<a class="btn-sm btn-cert" href="${certLink}">📋 Certifier Email</a>`:""}
        </div>
      </div>
      ${jobsHtml}
    </div>`;
  });
  html+=`</div>`;
  document.getElementById("app").innerHTML=html;
  document.getElementById("week-nav").style.display="flex";
}

// RENDER DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDashboard(){
  document.getElementById("alert-banner").style.display="none";
  document.getElementById("week-nav").style.display="none";
  const today=new Date().toISOString().split("T")[0];
  const weekDays=getWeekDays(getMondayOf(today));
  const weekJobs=jobs.filter(j=>weekDays.includes(j.date));
  const pending=jobs.filter(j=>j.status==="PENDING RESCHEDULE");

  // ── Builder stats: total | reschedules (our fault) | futiles (their fault) ──
  const bs={};
  jobs.forEach(j=>{
    if(!bs[j.customer])bs[j.customer]={total:0,resched:0,futile:0};
    bs[j.customer].total++;
    if(j.status==="RESCHEDULED"||j.status==="PENDING RESCHEDULE")bs[j.customer].resched++;
    if(j.status==="FUTILE")bs[j.customer].futile++;
  });
  const builderRows=Object.entries(bs).sort((a,b)=>b[1].total-a[1].total).slice(0,12).map(([name,s],i)=>{
    const ontime=s.total>0?Math.round(((s.total-s.resched-s.futile)/s.total)*100):100;
    const futileRate=s.total>0?Math.round((s.futile/s.total)*100):0;
    const reschedRate=s.total>0?Math.round((s.resched/s.total)*100):0;
    const otColor=ontime>=80?"#166534":ontime>=60?"#854d0e":"#991b1b";
    const frColor=futileRate===0?"#166534":futileRate<=10?"#854d0e":"#991b1b";
    const futileFlag=s.futile>=3?'<span style="font-size:9px;background:#fee2e2;color:#991b1b;padding:1px 5px;border-radius:3px;font-weight:800;margin-left:4px">⚠ REPEATED FUTILES</span>':"";
    return `<tr>
      <td style="font-weight:700">${name}</td>
      <td style="text-align:center">${s.total}</td>
      <td style="text-align:center">${s.resched}<span style="font-size:9px;color:#854d0e;margin-left:3px">(${reschedRate}%)</span></td>
      <td style="text-align:center">${s.futile}<span style="font-size:9px;color:#991b1b;margin-left:3px">(${futileRate}%)</span>${futileFlag}</td>
      <td style="text-align:center"><span style="font-weight:800;color:${otColor}">${ontime}%</span></td>
      <td>
        <div style="display:flex;gap:4px;align-items:center">
          <div style="flex:1;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden">
            <div class="rate-bar" style="width:${ontime}%;background:${otColor}"></div>
          </div>
        </div>
      </td>
    </tr>`;
  }).join("");

  const pendingRows=pending.map(j=>{
    const f=FITTERS.find(f=>f.id===j.fitter);
    return `<tr>
      <td>${formatDate(j.date)}</td>
      <td style="font-weight:700;color:${f?.color||"#000"}">${(j.fitter||"").toUpperCase()}</td>
      <td style="font-weight:600">${j.customer}</td>
      <td>${j.address}, ${j.suburb}</td>
      <td>${j.doors}</td>
      <td>${zoneTag(getZone(j.suburb))}</td>
      <td><a class="btn-resched" style="font-size:10px;padding:3px 7px;border-radius:4px;text-decoration:none" href="${buildReschedEmail(j)}">📧 Email</a></td>
    </tr>`;
  }).join("");

  const effortItems=cfg_live.doorEfforts.map(d=>`<div class="effort-item"><span style="font-size:11px;font-weight:600">${d.type}</span><span class="effort-pts">${d.pts}</span></div>`).join("");
  const zoneItems=cfg_live.zoneGroups.map(z=>{const zc=ZONE_COLORS[z.zone]||ZONE_COLORS["UNKNOWN"];return `<div class="zone-rule"><div style="margin-bottom:5px">${zoneTag(z.zone)}</div><div style="font-size:10px;color:#6b7280">Can combine with: <strong>${z.canMix.join(", ")}</strong></div></div>`;}).join("");

  const tabs={
    builders:`<div>
      <h3 class="section-title">Builder Performance — Reschedules vs Futiles</h3>
      <p style="font-size:11px;color:#6b7280;margin-bottom:10px;background:#fff;border-radius:6px;padding:8px 12px;border:1px solid #e5e7eb">
        <strong style="color:#854d0e">Reschedules</strong> = rescheduled by us (door not in, our scheduling, etc) &nbsp;|&nbsp;
        <strong style="color:#991b1b">Futiles</strong> = builder's fault (site not ready, locked, trades in way) — futile visit charges may apply &nbsp;|&nbsp;
        <span style="color:#991b1b;font-weight:700">⚠ REPEATED FUTILES</span> = 3+ futile visits for this builder
      </p>
      <div class="table-wrap">
        <table>
          <thead style="background:#f8fafc"><tr>
            <th>Builder</th>
            <th style="text-align:center">Total Jobs</th>
            <th style="text-align:center">Reschedules (our end)</th>
            <th style="text-align:center">Futiles (builder fault)</th>
            <th style="text-align:center">On-Time Rate</th>
            <th>Rate Bar</th>
          </tr></thead>
          <tbody>${builderRows}</tbody>
        </table>
      </div>
    </div>`,
    pending:`<div>
      <h3 class="section-title" style="color:#991b1b">⚠ Pending Reschedule — Action Required</h3>
      ${pending.length===0?'<div style="padding:20px;text-align:center;color:#6b7280;font-size:12px">No pending reschedules 🎉</div>':`<div class="table-wrap" style="border-color:#fca5a5">
        <table><thead style="background:#fee2e2"><tr>
          <th style="color:#991b1b">Date</th><th style="color:#991b1b">Fitter</th>
          <th style="color:#991b1b">Customer</th><th style="color:#991b1b">Address</th>
          <th style="color:#991b1b">Doors</th><th style="color:#991b1b">Zone</th><th style="color:#991b1b">Action</th>
        </tr></thead><tbody>${pendingRows}</tbody></table>
      </div>`}
    </div>`,
    zones:`<div>
      <h3 class="section-title">Zone Compatibility Rules</h3>
      <p style="font-size:11px;color:#6b7280;margin-bottom:10px">Zones that can be combined on the same day for the same fitter. Mixing anything outside these groups triggers a ⚠ warning.</p>
      <div class="zone-rules">${zoneItems}</div>
      <h3 class="section-title">Door Type Effort Points</h3>
      <p style="font-size:11px;color:#6b7280;margin-bottom:10px">Points are added up per fitter per day against their capacity limit. Rescheduled and Futile jobs are excluded from the count.</p>
      <div class="effort-table">${effortItems}</div>
    </div>`,
  };

  const kpiFutile=weekJobs.filter(j=>j.status==="FUTILE").length;
  const kpiResched=weekJobs.filter(j=>j.status==="RESCHEDULED").length;

  document.getElementById("app").innerHTML=`<div class="dashboard">
    <div class="kpi-row">
      <div class="kpi" style="background:#eff6ff;border-color:#bfdbfe"><div class="kpi-val" style="color:#1d4ed8">${weekJobs.length}</div><div class="kpi-label">This Week Jobs</div></div>
      <div class="kpi" style="background:#dcfce7;border-color:#86efac"><div class="kpi-val" style="color:#166534">${weekJobs.filter(j=>j.status==="COMPLETED").length}</div><div class="kpi-label">Completed</div></div>
      <div class="kpi" style="background:#e0f2fe;border-color:#7dd3fc"><div class="kpi-val" style="color:#0369a1">${weekJobs.filter(j=>j.status==="CONFIRMED").length}</div><div class="kpi-label">Confirmed</div></div>
      <div class="kpi" style="background:#fee2e2;border-color:#fca5a5"><div class="kpi-val" style="color:#991b1b">${kpiFutile}</div><div class="kpi-label">Futile (Builder Fault)</div></div>
      <div class="kpi" style="background:#fef9c3;border-color:#fde68a"><div class="kpi-val" style="color:#854d0e">${kpiResched}</div><div class="kpi-label">Rescheduled (Our End)</div></div>
    </div>
    <div class="tab-strip">
      <button class="tab-btn${dashTab==="builders"?" active":""}" onclick="setDashTab('builders')">📊 Builder Stats</button>
      <button class="tab-btn${dashTab==="pending"?" active":""}" onclick="setDashTab('pending')">⚠ Pending Reschedule (${pending.length})</button>
      <button class="tab-btn${dashTab==="zones"?" active":""}" onclick="setDashTab('zones')">🗺 Zone & Effort Reference</button>
    </div>
    <div id="dash-tab-content">${tabs[dashTab]}</div>
  </div>`;
}

function setDashTab(tab){ dashTab=tab; renderDashboard(); }

function saveMSRow() {
  const customer = document.getElementById('msf-customer').value;
  const address  = document.getElementById('msf-address').value;
  if (!customer || !address) { alert('Customer and address are required.'); return; }

  const row = {
    po:          document.getElementById('msf-po').value,
    customer,
    address,
    suburb:      document.getElementById('msf-suburb').value,
    status:      document.getElementById('msf-status').value,
    profile:     document.getElementById('msf-profile').value,
    colour:      document.getElementById('msf-colour').value,
    height:      document.getElementById('msf-height').value,
    width:       document.getElementById('msf-width').value,
    lhr:         document.getElementById('msf-lhr').value,
    measuredDate:document.getElementById('msf-measDate').value,
    quote:       document.getElementById('msf-quote').value,
    photo:       document.getElementById('msf-photo').value,
    notes:       document.getElementById('msf-notes').value,
  };

  if (msModalIdx !== null) {
    measureJobs[msModalIdx] = row;
  } else {
    // Insert new job in correct position:
    // sorted by zone section → suburb → street → lot number descending
    function parseLotN(addr) {
      const m = (addr||'').match(/^LOT\s+(\d+)/i);
      return m ? parseInt(m[1]) : 0;
    }
    function parseStreetN(addr) {
      return (addr||'').replace(/^LOT\s+\d+\s*(\(\d+\))?\s*/i,'').replace(/^\d+\s*(\/\d+)?\s*/,'').trim().toUpperCase();
    }

    const zone = SUBURB_ZONE_MAP[(row.suburb||'').toUpperCase()] || 'UNKNOWN';
    const zoneIdx = ZONE_SECTION_ORDER.indexOf(zone);
    const rowStreet = parseStreetN(row.address);
    const rowLot    = parseLotN(row.address);

    let insertIdx = measureJobs.length; // default: append
    for (let i = 0; i < measureJobs.length; i++) {
      const j = measureJobs[i];
      const jZone    = SUBURB_ZONE_MAP[(j.suburb||'').toUpperCase()] || 'UNKNOWN';
      const jZoneIdx = ZONE_SECTION_ORDER.indexOf(jZone);
      // Is this job "after" the new job in sort order?
      if (jZoneIdx > zoneIdx) { insertIdx = i; break; }
      if (jZoneIdx === zoneIdx) {
        const subCmp = (j.suburb||'').localeCompare(row.suburb||'');
        if (subCmp > 0) { insertIdx = i; break; }
        if (subCmp === 0) {
          const jStreet = parseStreetN(j.address);
          const streetCmp = jStreet.localeCompare(rowStreet);
          if (streetCmp > 0) { insertIdx = i; break; }
          if (streetCmp === 0) {
            // Same street — insert descending by lot (higher lots first)
            if (parseLotN(j.address) < rowLot) { insertIdx = i; break; }
          }
        }
      }
    }
    measureJobs.splice(insertIdx, 0, row);
  }

  saveMod('measure', measureJobs);
  document.getElementById('ms-modal').style.display = 'none';
  renderMeasure();
}

function deleteMSRow(idx) {
  if (!confirm(`Delete measure job for ${measureJobs[idx]?.customer}?`)) return;
  measureJobs.splice(idx, 1);
  saveMod('measure', measureJobs);
  renderMeasure();
}

// READY TO ORDER
// Auto-calculated from Install Diary jobs with REQUESTED status.
// Install date → truck week (order by = 3 Mondays before install
// week; truck arrival = 2 Mondays before; install week from = Monday)
// ═══════════════════════════════════════════════════════════════

function getMondayOfWeek(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d;
}

function addWeeks(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n * 7);
  return d;
}

function getPrevFriday(date) {
  const d = new Date(date);
  // Go back to the Friday before the given Monday
  d.setDate(d.getDate() - 3);
  return d;
}

function dateToIso(d) {
  return d.toISOString().split('T')[0];
}

function fmtShort(d) {
  if (!d) return '—';
  const dt = typeof d === 'string' ? new Date(d + 'T00:00:00') : d;
  return dt.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
}

function calcTruckWeek(installDateStr) {
  // Install date → install week Monday
  const installMonday = getMondayOfWeek(installDateStr);
  // Truck arrives 2 weeks before install week Monday
  const truckArrival  = addWeeks(installMonday, -2);
  // Order by = Friday before truck arrival week (i.e. Friday 3 weeks before install week)
  const truckMonday   = getMondayOfWeek(dateToIso(truckArrival));
  const orderByFri    = addWeeks(truckMonday, -1);
  orderByFri.setDate(orderByFri.getDate() + 4); // Monday → Friday

  return {
    installWeekFrom: dateToIso(installMonday),
    truckArrival:    dateToIso(truckArrival),
    orderBy:         dateToIso(orderByFri),
    sortKey:         dateToIso(installMonday),
  };
}

function buildRTOData() {
  // Collect all diary jobs that are REQUESTED or CONFIRMED (have an install date booked)
  // and cross-reference with measure sheet for dimensions
  const eligible = jobs.filter(j =>
    j.date &&
    (j.status === 'REQUESTED' || j.status === 'CONFIRMED') &&
    j.customer
  );

  // Also include rtoJobs that were manually added (from original workbook seed)
  // but de-duplicate by address
  const result = [];
  const seen = new Set();

  eligible.forEach(j => {
    const key = (j.address||'').toUpperCase().trim();
    if (seen.has(key)) return;
    seen.add(key);

    // Try to find matching measure job for dimensions
    const mJob = measureJobs.find(m =>
      m.customer === j.customer &&
      (m.address === j.address ||
       (j.suburb && m.suburb === j.suburb && m.address && j.address && m.address.includes(j.address.split(' ').pop())))
    );

    const tw = calcTruckWeek(j.date);
    const hasMeasure = mJob && mJob.height && mJob.width;

    result.push({
      _source: 'diary',
      _jobId:  j.id,
      po:      j.sage || mJob?.po || '',
      customer: j.customer,
      address:  j.address,
      suburb:   j.suburb,
      profile:  j.doorType || mJob?.profile || '',
      colour:   mJob?.colour || '',
      doorType: j.doors || mJob?.profile || '',
      reqH:     mJob?.height || '',
      reqW:     mJob?.width  || '',
      qkClose:  'NO',
      extRail:  'NO',
      measureDate: hasMeasure ? (mJob.measuredDate||'MEASURED') : 'MISSING MEASUREMENTS',
      notes:    j.builderNotes || mJob?.notes || '',
      quote:    mJob?.quote || '',
      actH:     mJob?.height || '',
      actW:     mJob?.width  || '',
      lhr:      mJob?.lhr || '',
      installDate: j.date,
      effort:   j.effort || '',
      supplyOnly: '',
      truckWeek:   tw,
      missingMeas: !hasMeasure,
    });
  });

  // Also include manually-added RTO jobs not already covered
  rtoJobs.forEach(r => {
    const key = (r.address||'').toUpperCase().trim();
    if (seen.has(key)) return;
    seen.add(key);

    const tw = r.installDate ? calcTruckWeek(r.installDate) : null;
    result.push({
      ...r,
      _source: 'manual',
      truckWeek: tw || {installWeekFrom:'9999-99-99',truckArrival:'',orderBy:'',sortKey:'9999-99-99'},
      missingMeas: r.measureDate==='MISSING MEASUREMENTS' || (!r.actH && !r.height),
    });
  });

  // Sort by install date
  result.sort((a,b) => (a.truckWeek?.sortKey||'').localeCompare(b.truckWeek?.sortKey||''));
  return result;
}

function renderMeasure() {
  document.getElementById('week-nav').style.display='none';
  document.getElementById('alert-banner').style.display='none';

  const filterStatus = document.getElementById('ms-filter')?.value || 'ALL';
  const filterZone   = document.getElementById('ms-zone')?.value || 'ALL';
  const search       = (document.getElementById('ms-search')?.value || '').toLowerCase();

  // Status counts
  const counts = {};
  MS_STATUSES.forEach(s => counts[s] = measureJobs.filter(r => r.status===s).length);
  const totalMeasured = counts['MEASURED']||0;
  const totalPending  = (counts['READY TO MEASURE']||0) + (counts['AWAITING UPDATE']||0);
  const totalMissing  = counts['MISSING MEASUREMENTS']||0;

  // Filter jobs
  let filtered = measureJobs;
  if (filterStatus !== 'ALL') filtered = filtered.filter(r => r.status === filterStatus);
  if (filterZone   !== 'ALL') filtered = filtered.filter(r => getMeasureZone(r) === filterZone);
  if (search) filtered = filtered.filter(r => JSON.stringify(r).toLowerCase().includes(search));

  // Group by zone section, then sort by suburb within each
  const grouped = {};
  ZONE_SECTION_ORDER.forEach(z => grouped[z] = []);
  filtered.forEach(r => {
    const z = getMeasureZone(r);
    if (!grouped[z]) grouped[z] = [];
    grouped[z].push(r);
  });
  // Sort: suburb alphabetically, then street name, then lot number DESCENDING
  // e.g. LOT 174 SHELLY COURT before LOT 155 SHELLY COURT
  function parseLot(addr) {
    const m = (addr||'').match(/^LOT\s+(\d+)/i);
    return m ? parseInt(m[1]) : 0;
  }
  function parseStreet(addr) {
    return (addr||'').replace(/^LOT\s+\d+\s*(\(\d+\))?\s*/i,'').replace(/^\d+\s*(\/\d+)?\s*/,'').trim().toUpperCase();
  }
  ZONE_SECTION_ORDER.forEach(z => {
    grouped[z].sort((a,b) => {
      // 1. Sort by suburb
      const subCmp = (a.suburb||'').localeCompare(b.suburb||'');
      if (subCmp !== 0) return subCmp;
      // 2. Sort by street name
      const streetA = parseStreet(a.address), streetB = parseStreet(b.address);
      const streetCmp = streetA.localeCompare(streetB);
      if (streetCmp !== 0) return streetCmp;
      // 3. Sort by lot number DESCENDING (highest first)
      return parseLot(b.address) - parseLot(a.address);
    });
  });

  const statusPills = MS_STATUSES.map(s => {
    const sc = MS_COLORS[s] || {bg:'#f3f4f6',c:'#374151'};

        <td>
          <span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:${sc.bg};color:${sc.c};border:1px solid ${sc.c}40;white-space:nowrap;cursor:pointer"

function saveMSRow() {
  const customer = document.getElementById('msf-customer').value;
  const address  = document.getElementById('msf-address').value;
  if (!customer || !address) { alert('Customer and address are required.'); return; }

  const row = {
    po:          document.getElementById('msf-po').value,
    customer,
    address,
    suburb:      document.getElementById('msf-suburb').value,
    status:      document.getElementById('msf-status').value,
    profile:     document.getElementById('msf-profile').value,
    colour:      document.getElementById('msf-colour').value,
    height:      document.getElementById('msf-height').value,
    width:       document.getElementById('msf-width').value,
    lhr:         document.getElementById('msf-lhr').value,
    measuredDate:document.getElementById('msf-measDate').value,
    quote:       document.getElementById('msf-quote').value,
    photo:       document.getElementById('msf-photo').value,
    notes:       document.getElementById('msf-notes').value,
  };

  if (msModalIdx !== null) {
    measureJobs[msModalIdx] = row;
  } else {
    // Insert new job in correct position:
    // sorted by zone section → suburb → street → lot number descending
    function parseLotN(addr) {
      const m = (addr||'').match(/^LOT\s+(\d+)/i);
      return m ? parseInt(m[1]) : 0;
    }
    function parseStreetN(addr) {
      return (addr||'').replace(/^LOT\s+\d+\s*(\(\d+\))?\s*/i,'').replace(/^\d+\s*(\/\d+)?\s*/,'').trim().toUpperCase();
    }

    const zone = SUBURB_ZONE_MAP[(row.suburb||'').toUpperCase()] || 'UNKNOWN';
    const zoneIdx = ZONE_SECTION_ORDER.indexOf(zone);
    const rowStreet = parseStreetN(row.address);
    const rowLot    = parseLotN(row.address);

    let insertIdx = measureJobs.length; // default: append
    for (let i = 0; i < measureJobs.length; i++) {
      const j = measureJobs[i];
      const jZone    = SUBURB_ZONE_MAP[(j.suburb||'').toUpperCase()] || 'UNKNOWN';
      const jZoneIdx = ZONE_SECTION_ORDER.indexOf(jZone);
      // Is this job "after" the new job in sort order?
      if (jZoneIdx > zoneIdx) { insertIdx = i; break; }
      if (jZoneIdx === zoneIdx) {
        const subCmp = (j.suburb||'').localeCompare(row.suburb||'');
        if (subCmp > 0) { insertIdx = i; break; }
        if (subCmp === 0) {
          const jStreet = parseStreetN(j.address);
          const streetCmp = jStreet.localeCompare(rowStreet);
          if (streetCmp > 0) { insertIdx = i; break; }
          if (streetCmp === 0) {
            // Same street — insert descending by lot (higher lots first)
            if (parseLotN(j.address) < rowLot) { insertIdx = i; break; }
          }
        }
      }
    }
    measureJobs.splice(insertIdx, 0, row);
  }

  saveMod('measure', measureJobs);
  document.getElementById('ms-modal').style.display = 'none';
  renderMeasure();
}

function deleteMSRow(idx) {
  if (!confirm(`Delete measure job for ${measureJobs[idx]?.customer}?`)) return;
  measureJobs.splice(idx, 1);
  saveMod('measure', measureJobs);
  renderMeasure();
}

          ${zones.map(z=>`<option${z===zoneFilter?' selected':''}>${z}</option>`).join('')}
        </select>
        ${mapsUrl?`<a href="${mapsUrl}" target="_blank" style="background:#166534;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:700;text-decoration:none">🗺 Open Route (${ticked.length} stops)</a>`:'<span style="font-size:11px;color:#9ca3af">Tick jobs to build route</span>'}

}

      <table><thead style="background:#f5f3ff"><tr>

// ═══════════════════════════════════════════════════════════════
const STOCK_ST=['IN STOCK','DUPLICATE - SEND BACK','ASSIGNED TO JOB','DUMP','SOLD'];
const STOCK_COLORS={'IN STOCK':{bg:'#dcfce7',c:'#166534'},'DUPLICATE - SEND BACK':{bg:'#fef9c3',c:'#854d0e'},'ASSIGNED TO JOB':{bg:'#dbeafe',c:'#1d4ed8'},'DUMP':{bg:'#fee2e2',c:'#991b1b'},'SOLD':{bg:'#f3f4f6',c:'#6b7280'}};

function renderStock(){
  document.getElementById('week-nav').style.display='none';
  document.getElementById('alert-banner').style.display='none';
  const search=(document.getElementById('stock-search')?.value||'').toLowerCase();
  const stF=document.getElementById('stock-status')?.value||'ALL';
  let rows=stockDoors;
  if(search) rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(search));
  if(stF!=='ALL') rows=rows.filter(r=>r.status===stF);
  const counts={};STOCK_ST.forEach(s=>counts[s]=stockDoors.filter(r=>r.status===s).length);
  const pills=STOCK_ST.map(s=>{const sc=STOCK_COLORS[s]||{bg:'#f3f4f6',c:'#374151'};return `<div style="background:${sc.bg};color:${sc.c};border:1px solid ${sc.c}30;padding:5px 10px;border-radius:6px;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap" onclick="document.getElementById('stock-status').value='${s}';renderStock()">${s}: ${counts[s]||0}</div>`;}).join('');

  const rowsH=rows.map((r,i)=>{
    const orig=stockDoors.indexOf(r);
    const sc=STOCK_COLORS[r.status]||{bg:'#f3f4f6',c:'#374151'};
    const bg=(r.status==='DUMP')?'#fee2e2':(r.status==='DUPLICATE - SEND BACK')?'#fef9c3':(i%2?'#f8fafc':'#fff');
    return `<tr style="background:${bg}">
      <td style="font-weight:700">${escH(r.builder)}</td>
      <td style="font-size:10px;color:#6b7280">${escH(r.po)}</td>
      <td>${escH(r.address)}</td><td>${escH(r.suburb)}</td>
      <td><span style="font-size:9px;font-weight:700;background:#e0e7ff;color:#3730a3;padding:1px 5px;border-radius:3px">${escH(r.profile)}</span></td>
      <td>${escH(r.colour)}</td>
      <td style="font-size:11px">${escH(r.doorType)}</td>
      <td style="text-align:center">${escH(r.doorH)}</td>
      <td style="text-align:center">${escH(r.doorW)}</td>
      <td style="font-weight:700;color:#1d4ed8;font-size:11px">${escH(r.prodSon)}</td>
      <td><span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:${sc.bg};color:${sc.c};white-space:nowrap">${r.status||'IN STOCK'}</span></td>
      <td style="font-size:10px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escH(r.comments)}">${escH(r.comments)}</td>
      <td>
        <select onchange="stockDoors[${orig}].status=this.value;saveMod('stock',stockDoors);renderStock()" style="font-size:9px;padding:2px 4px;border:1px solid #d1d5db;border-radius:3px;cursor:pointer">
          ${STOCK_ST.map(s=>`<option${s===r.status?' selected':''}>${s}</option>`).join('')}
        </select>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('app').innerHTML=`<div style="padding:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div><h2 style="font-size:16px;font-weight:900;color:#1f2937">🚪 Stock Doors</h2>
      <p style="font-size:11px;color:#6b7280">Spare, duplicate and stock doors. ${stockDoors.length} doors.</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="stock-search" placeholder="Search..." value="${escH(search)}" onkeyup="renderStock()"
          style="font-size:11px;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;width:180px">
        <select id="stock-status" onchange="renderStock()" style="font-size:11px;padding:6px 8px;border:1px solid #d1d5db;border-radius:6px">
          <option value="ALL">All (${stockDoors.length})</option>
          ${STOCK_ST.map(s=>`<option value="${s}"${stF===s?' selected':''}>${s} (${counts[s]||0})</option>`).join('')}
        </select>
        <button onclick="addStockRow()" style="background:#374151;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer">+ Add Door</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">${pills}</div>
    <div class="table-wrap">
      <table><thead><tr>
        <th>Builder</th><th>PO / Ref</th><th>Address</th><th>Suburb</th>
        <th>Profile</th><th>Colour</th><th>Type</th><th>H</th><th>W</th>
        <th>SON / Prod #</th><th>Status</th><th>Comments</th><th>Change Status</th>
      </tr></thead>
      <tbody>${rowsH||'<tr><td colspan="13" style="text-align:center;padding:20px;color:#6b7280">No stock doors</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}
function addStockRow(){
  const builder=prompt('Builder / Customer:');if(!builder)return;
  const prodSon=prompt('SON / Production #:')||'';
  const profile=prompt('Profile (e.g. STRUTLOK):')||'';
  const colour=prompt('Colour:')||'';
  stockDoors.unshift({builder,po:'',address:'',suburb:'',profile,colour,doorType:'',doorH:'',doorW:'',prodSon,status:'IN STOCK',comments:''});
  saveMod('stock',stockDoors);renderStock();
}

function renderHandDeliver(){
  document.getElementById('week-nav').style.display='none';
  document.getElementById('alert-banner').style.display='none';
  const search=(document.getElementById('hd-search')?.value||'').toLowerCase();
  let rows=handDeliver;
  if(search) rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(search));
  const pending=rows.filter(r=>!r.dateCollected);
  const collected=rows.filter(r=>r.dateCollected);

  function makeRows(arr,showBtn){
    return arr.map(r=>{
      const orig=handDeliver.indexOf(r);
      const done=!!r.dateCollected;
      return `<tr style="background:${done?'#dcfce7':'#fff'}">
        <td>${fmtD(r.dateCompleted)}</td>
        <td style="font-weight:700">${escH(r.builder)}</td>
        <td>${escH(r.address)}</td>
        <td style="text-align:center;font-weight:800">${r.handsets||'—'}</td>
        <td style="text-align:center">${r.keys||'—'}</td>
        <td style="text-align:center">${r.basePlate||'—'}</td>
        <td style="text-align:center">${r.manual||'—'}</td>
        <td style="text-align:center">${r.powerMesh||'—'}</td>
        <td style="text-align:center">${r.wallButton||'—'}</td>
        <td>${done?fmtD(r.dateCollected):'<span style="color:#991b1b;font-weight:700;font-size:10px">⏳ PENDING</span>'}</td>
        <td style="font-size:10px">${escH(r.collectedBy)}</td>
        <td style="font-size:10px">${escH(r.signature)}</td>
        <td style="white-space:nowrap">
          ${showBtn&&!done?`<button onclick="markHSCollected(${orig})" style="font-size:9px;padding:2px 8px;background:#166534;color:#fff;border:none;border-radius:3px;cursor:pointer">✓ Mark Collected</button> `:''}
          <button onclick="delHSDeliver(${orig})" style="font-size:9px;padding:2px 5px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:3px;cursor:pointer">✕</button>
        </td>
      </tr>`;
    }).join('');
  }

  document.getElementById('app').innerHTML=`<div style="padding:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><h2 style="font-size:16px;font-weight:900;color:#1f2937">🔑 Handsets To Deliver</h2>
      <p style="font-size:11px;color:#6b7280">Handsets, keys and accessories pending collection by builders.</p></div>
      <div style="display:flex;gap:8px">
        <input id="hd-search" placeholder="Search builder, address..." value="${escH(search)}" onkeyup="renderHandDeliver()"
          style="font-size:11px;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;width:200px">
        <button onclick="addHSDeliver()" style="background:#1d4ed8;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer">+ Add Entry</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:6px;padding:8px 14px;font-size:11px"><strong style="color:#991b1b">⏳ Pending Collection:</strong> ${pending.length}</div>
      <div style="background:#dcfce7;border:1px solid #86efac;border-radius:6px;padding:8px 14px;font-size:11px"><strong style="color:#166534">✓ Collected:</strong> ${collected.length}</div>
    </div>

    ${pending.length?`
    <div style="margin-bottom:4px;padding:6px 12px;background:#991b1b;color:#fff;font-size:11px;font-weight:800;border-radius:6px 6px 0 0">⏳ PENDING COLLECTION (${pending.length})</div>
    <div class="table-wrap" style="border-radius:0 0 8px 8px;margin-bottom:16px">
      <table><thead><tr>
        <th>Date Completed</th><th>Builder</th><th>Address</th>
        <th style="text-align:center">Handsets</th><th style="text-align:center">Keys</th>
        <th style="text-align:center">Base Plate</th><th style="text-align:center">Manual</th>
        <th style="text-align:center">Power Mesh</th><th style="text-align:center">Wall Btn</th>
        <th>Date Collected</th><th>Collected By</th><th>Signature</th><th>Actions</th>
      </tr></thead><tbody>${makeRows(pending,true)}</tbody></table>
    </div>`:''}

    <div style="margin-bottom:4px;padding:6px 12px;background:#166534;color:#fff;font-size:11px;font-weight:800;border-radius:6px 6px 0 0">✓ COLLECTED (${collected.length})</div>
    <div class="table-wrap" style="border-radius:0 0 8px 8px">
      <table><thead><tr>
        <th>Date Completed</th><th>Builder</th><th>Address</th>
        <th style="text-align:center">Handsets</th><th style="text-align:center">Keys</th>
        <th style="text-align:center">Base Plate</th><th style="text-align:center">Manual</th>
        <th style="text-align:center">Power Mesh</th><th style="text-align:center">Wall Btn</th>
        <th>Date Collected</th><th>Collected By</th><th>Signature</th><th></th>
      </tr></thead><tbody>${makeRows(collected,false)||'<tr><td colspan="13" style="text-align:center;padding:14px;color:#6b7280">None yet</td></tr>'}</tbody></table>
    </div>
  </div>`;
}

function addHSDeliver(){
  const builder=prompt('Builder:');if(!builder)return;
  const address=prompt('Site address:');if(!address)return;
  const qty=prompt('Number of handsets:','2')||'2';
  handDeliver.unshift({dateCompleted:new Date().toISOString().split('T')[0],builder,address,
    handsets:qty,keys:'',basePlate:'',manual:'1',powerMesh:'',wallButton:'1',
    dateCollected:'',collectedBy:'',signature:''});
  saveMod('handDeliver',handDeliver);renderHandDeliver();
}
function markHSCollected(idx){
  const name=prompt('Collected by (print name):');if(!name)return;
  handDeliver[idx].dateCollected=new Date().toISOString().split('T')[0];
  handDeliver[idx].collectedBy=name;
  // Also push to records
  handRecords.unshift({...handDeliver[idx]});
  saveMod('handDeliver',handDeliver);saveMod('handRecords',handRecords);
  renderHandDeliver();
}
function delHSDeliver(idx){if(!confirm('Delete?'))return;handDeliver.splice(idx,1);saveMod('handDeliver',handDeliver);renderHandDeliver();}

// BUILDER SUMMARY
// ═══════════════════════════════════════════════════════════════
const BS_STATUSES=['COMPLETED','INSTALL CONFIRMED','INSTALL BOOKED','MEASURED','AWAITING TO MEASURE','AWAITING UPDATE','AWAITING BOOKING'];
const BS_COLORS={
  'COMPLETED':           {bg:'#dcfce7',c:'#166534'},
  'INSTALL CONFIRMED':   {bg:'#dbeafe',c:'#1d4ed8'},
  'INSTALL BOOKED':      {bg:'#e0e7ff',c:'#3730a3'},
  'MEASURED':            {bg:'#d1fae5',c:'#065f46'},
  'AWAITING TO MEASURE': {bg:'#fef9c3',c:'#854d0e'},
  'AWAITING UPDATE':     {bg:'#ede9fe',c:'#7c3aed'},
  'AWAITING BOOKING':    {bg:'#f3f4f6',c:'#374151'},
};
const BS_FLAGS={
  'COMPLETED':       {bg:'#dcfce7',c:'#166534'},
  'MISSING MEASURE': {bg:'#fee2e2',c:'#991b1b'},
  'MISSING PROFILE': {bg:'#fee2e2',c:'#991b1b'},
  'REQUESTED':       {bg:'#fef9c3',c:'#854d0e'},
  'AWAITING BOOKING':{bg:'#f3f4f6',c:'#6b7280'},
};
let bsBuilderFilter='ALL';

function renderBuilderSummary(){
  document.getElementById('week-nav').style.display='none';
  document.getElementById('alert-banner').style.display='none';
  const search=(document.getElementById('bs-search')?.value||'').toLowerCase();
  const statusF=document.getElementById('bs-status')?.value||'ALL';
  bsBuilderFilter=document.getElementById('bs-builder')?.value||'ALL';

  let rows=builderSummary;
  if(search) rows=rows.filter(r=>JSON.stringify(r).toLowerCase().includes(search));
  if(statusF!=='ALL') rows=rows.filter(r=>r.status===statusF);
  if(bsBuilderFilter!=='ALL') rows=rows.filter(r=>r.builder===bsBuilderFilter);

  const builders=[...new Set(builderSummary.map(r=>r.builder).filter(Boolean))].sort();
  const counts={};BS_STATUSES.forEach(s=>counts[s]=builderSummary.filter(r=>r.status===s).length);

  // Flags needing attention
  const flags=builderSummary.filter(r=>r.flag&&!['COMPLETED','REQUESTED'].includes(r.flag));
  const overdue=builderSummary.filter(r=>{
    if(!r.slBookedDate||r.status==='COMPLETED') return false;
    const d=new Date(r.slBookedDate+'T00:00:00');
    return d<new Date() && r.status!=='COMPLETED';
  });

  const statusPills=BS_STATUSES.map(s=>{
    const sc=BS_COLORS[s]||{bg:'#f3f4f6',c:'#374151'};
    return `<div style="background:${sc.bg};color:${sc.c};border:1px solid ${sc.c}30;padding:5px 10px;border-radius:6px;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap" onclick="document.getElementById('bs-status').value='${s}';renderBuilderSummary()">${s}: ${counts[s]||0}</div>`;
  }).join('');

  const rowsH=rows.map((r,i)=>{
    const orig=builderSummary.indexOf(r);
    const sc=BS_COLORS[r.status]||{bg:'#f8fafc',c:'#374151'};
    const fc=BS_FLAGS[r.flag]||{bg:'#f3f4f6',c:'#6b7280'};
    const isOverdue=r.slBookedDate&&new Date(r.slBookedDate+'T00:00:00')<new Date()&&r.status!=='COMPLETED';
    const bg=isOverdue?'#fee2e2':sc.bg+'30';
    const updateLink=buildBuilderSummaryEmail(r);
    return `<tr style="background:${bg}">
      <td style="font-weight:800">${escH(r.builder)}</td>
      <td style="font-size:10px;color:#6b7280">${escH(r.po)}</td>
      <td>${escH(r.address)}</td>
      <td>${escH(r.suburb)}</td>
      <td><span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:${sc.bg};color:${sc.c};white-space:nowrap">${r.status||'—'}</span></td>
      <td style="font-size:11px">${fmtD(r.builderReqDate)}</td>
      <td style="font-weight:700;color:${isOverdue?'#991b1b':'#1f2937'}">${fmtD(r.slBookedDate)}${isOverdue?' <span style="font-size:9px;color:#991b1b">⚠ OVERDUE</span>':''}</td>
      <td style="font-size:11px">${fmtD(r.builderNewDate)||'—'}</td>
      <td><span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:${fc.bg};color:${fc.c};white-space:nowrap">${r.flag||'—'}</span></td>
      <td><span style="font-size:9px;font-weight:700;background:#e0e7ff;color:#3730a3;padding:1px 5px;border-radius:3px">${escH(r.profile)}</span></td>
      <td style="font-size:11px">${escH(r.colour)}</td>
      <td style="font-size:10px;color:#6b7280">${fmtD(r.lastUpdated)}</td>
      <td>
        <div style="display:flex;gap:4px">
          <select onchange="builderSummary[${orig}].status=this.value;builderSummary[${orig}].lastUpdated=new Date().toISOString().split('T')[0];saveMod('builderSummary',builderSummary);renderBuilderSummary()" style="font-size:9px;padding:2px 4px;border:1px solid #d1d5db;border-radius:3px;cursor:pointer;max-width:110px">
            ${BS_STATUSES.map(s=>`<option${s===r.status?' selected':''}>${s}</option>`).join('')}
          </select>
          <a href="${updateLink}" style="font-size:9px;padding:2px 7px;background:#065f46;color:#fff;border-radius:3px;text-decoration:none;font-weight:700">📧</a>
          <button onclick="deleteBSRow(${orig})" style="font-size:9px;padding:2px 5px;background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:3px;cursor:pointer">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('app').innerHTML=`<div style="padding:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><h2 style="font-size:16px;font-weight:900;color:#1f2937">🏗 Builder Summary</h2>
      <p style="font-size:11px;color:#6b7280">Builder-facing job status board. Track requests vs Steel-Line booked dates. ${builderSummary.length} jobs.</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="bs-search" placeholder="Search..." value="${escH(search)}" onkeyup="renderBuilderSummary()"
          style="font-size:11px;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;width:180px">
        <select id="bs-builder" onchange="renderBuilderSummary()" style="font-size:11px;padding:6px 8px;border:1px solid #d1d5db;border-radius:6px">
          <option value="ALL">All Builders</option>
          ${builders.map(b=>`<option${b===bsBuilderFilter?' selected':''}>${b}</option>`).join('')}
        </select>
        <select id="bs-status" onchange="renderBuilderSummary()" style="font-size:11px;padding:6px 8px;border:1px solid #d1d5db;border-radius:6px">
          <option value="ALL">All Statuses</option>
          ${BS_STATUSES.map(s=>`<option${s===statusF?' selected':''}>${s} (${counts[s]||0})</option>`).join('')}
        </select>
        <button onclick="addBSRow()" style="background:#1d4ed8;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer">+ Add Job</button>
        <button onclick="sendAllBSEmails()" style="background:#065f46;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer">📧 Send All Updates</button>
      </div>
    </div>

    ${overdue.length?`<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#991b1b;font-weight:700">⚠ ${overdue.length} job${overdue.length>1?'s':''} past their booked date — review and update status</div>`:''}
    ${flags.length?`<div style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#854d0e;font-weight:700">⚠ ${flags.length} job${flags.length>1?'s':''} flagged — check MISSING MEASURE / MISSING PROFILE issues</div>`:''}

    <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">${statusPills}</div>

    <div class="table-wrap">
      <table><thead><tr>
        <th>Builder</th><th>PO</th><th>Address</th><th>Suburb</th><th>Status</th>
        <th>Builder Req Date</th><th>SL Booked Date</th><th>Builder New Date</th>

function getAllData() {
  return {
    _meta: {
      exportedAt:   new Date().toISOString(),
      exportedBy:   cfg_live.branchName || 'Steel-Line',
      version:      '1.0',
    },
    config:          cfg_live,
    jobs:            jobs,
    measureJobs:     measureJobs,
    rtoJobs:         rtoJobs,
    archiveJobs:     archiveJobs,
    handDeliver:     handDeliver,
    handOnsite:      handOnsite,
    handRecords:     handRecords,
    repRun:          repRun,
    supervisors:     supervisors,
    stockDoors:      stockDoors,
    builderSummary:  builderSummary,
  };
}

function exportData() {
  const data     = getAllData();
  const json     = JSON.stringify(data, null, 2);
  const blob     = new Blob([json], { type: 'application/json' });
  const url      = URL.createObjectURL(blob);
  const now      = new Date();
  const dateStr  = now.toISOString().slice(0,10);
  const timeStr  = now.toTimeString().slice(0,5).replace(':','');
  const branch   = (cfg_live.branchName || 'SteelLine').replace(/\s+/g,'-');
  const filename = `${branch}-ScheduleData-${dateStr}-${timeStr}.json`;

  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);

  // Record last export time
  localStorage.setItem('sl_last_export', new Date().toISOString());
  updateSyncStatus();
  showToast('✓ Exported — save this file to your shared SharePoint / OneDrive folder');
}

function importData() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data._meta) throw new Error('Not a valid Steel-Line data file');

      const exportTime = new Date(data._meta.exportedAt);
      const timeAgo    = formatTimeAgo(exportTime);
      const branch     = data._meta.exportedBy || 'Unknown';

      if (!confirm(
        `Import data from: ${branch}\n` +
        `Exported: ${exportTime.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'})} ` +
        `at ${exportTime.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})} (${timeAgo})\n\n` +
        `This will REPLACE all current data in your browser.\n` +
        `Make sure you have exported YOUR changes first if needed.\n\nContinue?`
      )) return;

      // Load all data
      if (data.config)         { saveConfig(data.config); }
      if (data.jobs)           { jobs = data.jobs; persistJobs(); }
      if (data.measureJobs)    { measureJobs = data.measureJobs; saveMod('measure', measureJobs); }
      if (data.rtoJobs)        { rtoJobs = data.rtoJobs; saveMod('rto', rtoJobs); }
      if (data.archiveJobs)    { archiveJobs = data.archiveJobs; saveMod('archive', archiveJobs); }
      if (data.handDeliver)    { handDeliver = data.handDeliver; saveMod('handDeliver', handDeliver); }
      if (data.handOnsite)     { handOnsite = data.handOnsite; saveMod('handOnsite', handOnsite); }
      if (data.handRecords)    { handRecords = data.handRecords; saveMod('handRecords', handRecords); }
      if (data.repRun)         { repRun = data.repRun; saveMod('repRun', repRun); }
      if (data.supervisors)    { supervisors = data.supervisors; saveMod('supervisors', supervisors); }
      if (data.stockDoors)     { stockDoors = data.stockDoors; saveMod('stock', stockDoors); }
      if (data.builderSummary) { builderSummary = data.builderSummary; saveMod('builderSummary', builderSummary); }

      nextId = Math.max(0, ...jobs.map(j => j.id)) + 1;

      localStorage.setItem('sl_last_import', new Date().toISOString());
      localStorage.setItem('sl_last_import_from', branch);
      if (typeof rebuildLookups === 'function') rebuildLookups();
      if (typeof render === 'function') render();
      const msg = `✓ Imported ${(data.jobs||[]).length} jobs, ${(data.measureJobs||[]).length} measure records`;
      if (typeof showToast === 'function') showToast(msg + ' — syncing to SharePoint...');
      else alert(msg);
      if (typeof spConnected !== 'undefined' && spConnected) {
        setTimeout(() => { if (typeof syncAllToSP === 'function') syncAllToSP(); }, 500);
      } else {
        if (typeof updateSyncStatus === 'function') updateSyncStatus();
      }
    } catch(err) {
      alert('Import failed: ' + err.message + '\n\nMake sure you selected a Steel-Line data export file (.json)');
    }
  };
  reader.readAsText(file);
  // Reset so same file can be re-imported
  event.target.value = '';
}

function formatTimeAgo(date) {
  const secs = Math.floor((new Date() - date) / 1000);
  if (secs < 60)   return 'just now';
  if (secs < 3600) return `${Math.floor(secs/60)} min ago`;
  if (secs < 86400)return `${Math.floor(secs/3600)} hr ago`;
  return `${Math.floor(secs/86400)} days ago`;
}

function updateSyncStatus() {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const lastExport = localStorage.getItem('sl_last_export');
  const lastImport = localStorage.getItem('sl_last_import');
  const importFrom = localStorage.getItem('sl_last_import_from');

  let parts = [];
  if (lastImport) {
    const d = new Date(lastImport);
    parts.push(`Last import: ${d.toLocaleDateString('en-AU',{day:'numeric',month:'short'})} ${d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}${importFrom?' from '+importFrom:''}`);
  }
  if (lastExport) {
    const d = new Date(lastExport);
    parts.push(`Last export: ${d.toLocaleDateString('en-AU',{day:'numeric',month:'short'})} ${d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}`);
  }
  if (!parts.length) {
    el.textContent = 'No sync yet — click Export to save data to your shared folder';
    el.style.color = '#64748b';
  } else {
    el.textContent = parts.join('   •   ');
    el.style.color = '#94a3b8';
  }
}

function showToast(msg) {
  const t = document.getElementById('save-toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}
